<mat-sidenav-container class="chat-container" autosize>
  <mat-sidenav
    #sidenav
    class="chat-sidenav"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    [fixedInViewport]="isMobile()"
  >
    <app-conversation-list
      [activeId]="store.activeConversationId()"
      [conversations]="store.conversations()"
      [loading]="store.isLoadingConversations()"
      (newChat)="newConversation()"
      (selectConversation)="onSelectConversation($event)"
      (deleteConversation)="onDeleteConversation($event)"
    />
  </mat-sidenav>

  <mat-sidenav-content class="chat-content">
    <mat-toolbar class="chat-toolbar">
      @if (isMobile()) {
        <button
          mat-icon-button
          (click)="toggleSidenav()"
          aria-label="Mở danh sách hội thoại"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">
        {{ store.activeConversation()?.title || 'Chatbot' }}
      </span>
      <span class="flex-spacer"></span>
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Tài khoản">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header">
          <span class="user-email">{{ currentUser()?.email }}</span>
        </div>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Đăng xuất</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <app-chat-window class="chat-window-host" />
  </mat-sidenav-content>
</mat-sidenav-container>
