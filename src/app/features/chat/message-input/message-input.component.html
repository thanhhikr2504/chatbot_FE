<div class="input-shell">
  @if (streaming) {
    <div class="streaming-indicator">
      <app-loading-dots />
      <span>AI đang trả lời...</span>
    </div>
  }

  <div class="input-row" [class.disabled]="streaming">
    <textarea
      #textarea
      class="input-area"
      rows="1"
      [ngModel]="value()"
      (ngModelChange)="onInput($event)"
      (keydown)="onKeydown($event)"
      [disabled]="streaming"
      [maxlength]="maxLength"
      placeholder="Nhập tin nhắn... (Shift+Enter để xuống dòng)"
      aria-label="Tin nhắn"
    ></textarea>

    <button
      type="button"
      class="send-btn"
      mat-icon-button
      [disabled]="!canSend"
      (click)="submit()"
      aria-label="Gửi tin nhắn"
    >
      <mat-icon>send</mat-icon>
    </button>
  </div>

  <div class="input-meta">
    <span class="hint">Enter để gửi · Shift+Enter để xuống dòng</span>
    <span class="counter" [class.warn]="charCount > maxLength * 0.9">
      {{ charCount }} / {{ maxLength }}
    </span>
  </div>
</div>
